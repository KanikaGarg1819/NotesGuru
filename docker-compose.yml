version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: notesguru_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notesguru}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notesguru123}
      POSTGRES_DB: ${POSTGRES_DB:-notesguru_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notesguru"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + cache) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: notesguru_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notesguru_backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker (background tasks) ────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notesguru_celery
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.worker worker --loglevel=info

  # ── Next.js Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: notesguru_frontend
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
